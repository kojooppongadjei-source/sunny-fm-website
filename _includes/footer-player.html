<style>
#sfp-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:99999;
  background:#1a1100;
  border-top:3px solid #C8920A;
  padding:.6rem 1.2rem;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 -4px 20px rgba(0,0,0,.3);
  font-family:'Segoe UI',Arial,sans-serif;
}
.sfp-logo{
  font-size:11px;font-weight:700;color:#C8920A;
  letter-spacing:.05em;text-transform:uppercase;
  flex-shrink:0;line-height:1.2;
  display:flex;flex-direction:column;
}
.sfp-logo span{font-size:9px;color:#888;font-weight:400;letter-spacing:.08em;}
.sfp-playbtn{
  width:40px;height:40px;border-radius:50%;
  background:#C8920A;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .2s;
}
.sfp-playbtn:hover{background:#a8760a;}
.sfp-playbtn svg{width:18px;height:18px;fill:#fff;margin-left:2px;}
.sfp-info{flex:1;min-width:0;}
.sfp-now{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:1px;}
.sfp-title{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sfp-sub{font-size:11px;color:#C8920A;}
.sfp-eq{display:flex;align-items:flex-end;gap:2px;height:18px;flex-shrink:0;}
.sfp-eq span{width:3px;background:#C8920A;border-radius:1px;opacity:0;}
.sfp-eq.active span{opacity:1;animation:sfp-eq 1.2s ease-in-out infinite;}
@keyframes sfp-eq{0%,100%{height:20%;}50%{height:100%;}}
.sfp-eq span:nth-child(1){animation-delay:0s}
.sfp-eq span:nth-child(2){animation-delay:.15s}
.sfp-eq span:nth-child(3){animation-delay:.3s}
.sfp-eq span:nth-child(4){animation-delay:.1s}
.sfp-eq span:nth-child(5){animation-delay:.25s}
.sfp-vol{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sfp-vol svg{width:14px;height:14px;fill:#888;}
.sfp-vol input[type=range]{width:70px;accent-color:#C8920A;cursor:pointer;}
.sfp-live{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.sfp-live-dot{width:7px;height:7px;border-radius:50%;background:#ff4444;animation:sfp-pulse 1.5s ease-in-out infinite;}
@keyframes sfp-pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.sfp-live span{font-size:10px;font-weight:700;color:#ff4444;text-transform:uppercase;letter-spacing:.06em;}

/* push page content up so footer player doesn't cover it */
body{padding-bottom:70px!important;}

@media(max-width:480px){
  .sfp-logo{display:none;}
  .sfp-vol{display:none;}
  #sfp-bar{padding:.5rem .8rem;gap:8px;}
  .sfp-title{font-size:12px;}
}
</style>

function toMins(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}

function updateNowPlaying(){
  var now=new Date();
  var dayIdx=now.getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  var d=DAYS[dayIdx];
  if(!d)return;
  var nowMins=now.getHours()*60+now.getMinutes();
  var slots=d.slots.slice().sort(function(a,b){return toMins(a.t)-toMins(b.t);});
  var current=null;
  for(var i=0;i<slots.length;i++){
    var sm=toMins(slots[i].t);
    var em=i+1<slots.length?toMins(slots[i+1].t):toMins(slots[i].t)+60;
    if(nowMins>=sm&&nowMins<em){current=slots[i];break;}
  }
  if(!current)current=slots[slots.length-1];
  if(current){
    document.getElementById('sfp-title').textContent=current.p;
    document.getElementById('sfp-sub').textContent=current.s;
  }
}

window.sfpToggle=function(){
  if(!audio){
    audio=new Audio(STREAM);
    audio.volume=document.getElementById('sfp-vol').value/100;
    audio.onerror=function(){
      document.getElementById('sfp-title').textContent='Stream unavailable';
      playing=false;
      document.getElementById('sfp-play-icon').innerHTML='<path d="M8 5v14l11-7z"/>';
      document.getElementById('sfp-eq').classList.remove('active');
    };
  }
  if(playing){
    audio.pause();playing=false;
    sessionStorage.removeItem('sfp-active');
    document.getElementById('sfp-play-icon').innerHTML='<path d="M8 5v14l11-7z"/>';
    document.getElementById('sfp-eq').classList.remove('active');
  } else {
    audio.play().then(function(){
      playing=true;
      sessionStorage.setItem('sfp-active','1');
      document.getElementById('sfp-play-icon').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      document.getElementById('sfp-eq').classList.add('active');
    }).catch(function(){
      document.getElementById('sfp-title').textContent='Tap play to listen';
    });
  }
};
window.sfpVol=function(v){if(audio)audio.volume=v/100;};

// Pause the radio if it's playing (used when other media on the page starts)
window.sfpPause=function(){
  if(audio&&playing){
    audio.pause();playing=false;
    sessionStorage.removeItem('sfp-active');
    document.getElementById('sfp-play-icon').innerHTML='<path d="M8 5v14l11-7z"/>';
    document.getElementById('sfp-eq').classList.remove('active');
  }
};

// Listen for any other audio/video on the page starting to play, and pause the radio
function watchPageMedia(){
  document.querySelectorAll('video, audio').forEach(function(el){
    if(el===audio)return; // skip our own player
    if(el._sfpWatched)return; // already attached
    el._sfpWatched=true;
    el.addEventListener('play',window.sfpPause);
  });
  // Also watch for YouTube/Vimeo iframes starting (best-effort via postMessage)
  document.querySelectorAll('iframe').forEach(function(el){
    if(el._sfpWatched)return;
    el._sfpWatched=true;
    el.addEventListener('load',function(){
      try{
        // YouTube iframe API postMessage listener
        window.addEventListener('message',function(e){
          try{
            var data=JSON.parse(e.data);
            if(data.event==='video-progress'||data.event==='infoDelivery'){
              if(data.info&&data.info.playerState===1){window.sfpPause();}
            }
            if(data.event==='onStateChange'&&data.info===1){window.sfpPause();}
          }catch(err){}
        });
      }catch(err){}
    });
  });
}
watchPageMedia();

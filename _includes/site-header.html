<style>
*{box-sizing:border-box;}
.site-nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e8e4dc;padding:10px 5%;display:flex;align-items:center;justify-content:space-between;font-family:'Segoe UI',Arial,sans-serif;}
.site-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.site-nav-logo img{height:46px;width:auto;display:block;}
.site-nav-links{display:flex;align-items:center;gap:22px;}
.site-nav-links a{color:#1a1a1a;font-size:14px;font-weight:500;text-decoration:none;transition:color .15s;white-space:nowrap;}
.site-nav-links a:hover{color:#a8760a;}
.site-nav-cta{background:#C8920A;color:#fff!important;padding:10px 20px;border-radius:8px;font-weight:600;}
.site-nav-cta:hover{background:#a8760a;}
.site-nav-donate{background:#C0392B;color:#fff!important;padding:10px 20px;border-radius:8px;font-weight:600;margin-left:8px;}
.site-nav-donate:hover{background:#962d21;}
.site-nav-tv{display:flex;align-items:center;gap:6px;background:#1a1a1a;color:#fff!important;padding:8px 16px;border-radius:8px;font-weight:600;}
.site-nav-tv:hover{background:#000;}
.site-nav-tv img{height:22px;width:auto;border-radius:4px;}
@media(max-width:1000px){.site-nav-links{display:none;}}

.site-nav-hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;flex-direction:column;justify-content:center;gap:5px;}
.site-nav-hamburger span{display:block;width:24px;height:2px;background:#1a1a1a;border-radius:2px;}
@media(max-width:1000px){.site-nav-hamburger{display:flex;}}

.site-mobile-menu{display:none;position:fixed;inset:0;top:0;background:rgba(0,0,0,.95);z-index:999;flex-direction:column;}
.site-mobile-menu.open{display:flex;}
.site-mobile-menu-header{background:#C8920A;padding:14px 5%;display:flex;align-items:center;justify-content:space-between;}
.site-mobile-menu-close{background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1;}
.site-mobile-menu-links{flex:1;overflow-y:auto;padding:16px 0;}
.site-mobile-menu-links a{display:block;color:#fff;padding:14px 6%;font-size:16px;font-weight:500;border-bottom:1px solid rgba(255,255,255,.08);text-decoration:none;}
.site-mobile-menu-links a:hover{color:#C8920A;}
.site-mobile-menu-links a.smm-cta:hover{color:#fff;}
.site-mobile-menu-links .smm-cta{background:#C8920A;color:#fff;margin:16px 6%;border-radius:8px;text-align:center;padding:14px;font-weight:700;border:none;}
</style>
<nav class="site-nav">
  <a href="/" class="site-nav-logo">
    <img src="/assets/sunny-fm-logo.png" alt="Sunny 88.7 FM — Positive Soul Music">
  </a>
  <div class="site-nav-links">
    <a href="/news/">News</a>
    <a href="/listen-live/">Listen Live</a>
    <a href="/lifestyle/">Lifestyle</a>
    <a href="/prayer-testimonies/">Prayer &amp; Testimonies</a>
    <a href="/preaching-teaching/">Preaching &amp; Teaching</a>
    <a href="/events/">Events</a>
    <a href="/music-videos/">Music &amp; Videos</a>
    <a href="/watch-tv/" class="site-nav-tv">
      <img src="/assets/sunny-tv-logo.png" alt="Sunny TV">
      Watch TV
    </a>
    <a href="/advertise/" class="site-nav-cta">Advertise</a>
    <a href="#" onclick="snOpenDonate();return false;" class="site-nav-donate">Donate</a>
  </div>
  <button class="site-nav-hamburger" onclick="toggleSiteMobileMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="site-mobile-menu" id="siteMobileMenu">
  <div class="site-mobile-menu-header">
    <img src="/assets/sunny-fm-logo.png" alt="Sunny FM" style="height:36px;width:auto;">
    <button class="site-mobile-menu-close" onclick="toggleSiteMobileMenu()">✕</button>
  </div>
  <div class="site-mobile-menu-links">
    <a href="/">Home</a>
    <a href="/news/">News</a>
    <a href="/listen-live/">Listen Live</a>
    <a href="/lifestyle/">Lifestyle</a>
    <a href="/prayer-testimonies/">Prayer &amp; Testimonies</a>
    <a href="/preaching-teaching/">Preaching &amp; Teaching</a>
    <a href="/events/">Events</a>
    <a href="/music-videos/">Music &amp; Videos</a>
    <a href="/watch-tv/">Watch Sunny TV</a>
    <a href="/advertise/" class="smm-cta">Advertise With Us</a>
    <a href="#" onclick="toggleSiteMobileMenu();snOpenDonate();return false;" class="smm-cta" style="background:#C0392B;">Donate</a>
  </div>
</div>
<script>
function toggleSiteMobileMenu(){
  document.getElementById('siteMobileMenu').classList.toggle('open');
}
</script>

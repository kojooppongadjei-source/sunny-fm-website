backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: https://sunnygh.com
display_url: https://sunnygh.com

publish_mode: editorial_workflow

collections:

  # ───────────────────────────────
  # NEWS
  # ───────────────────────────────
  - name: "news"
    label: "News"
    label_singular: "News Article"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Summary (shown on News list page)", name: "summary", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options: ["Community", "Church", "Events", "Announcements", "National", "Ministry"]

  # ───────────────────────────────
  # LIFESTYLE
  # ───────────────────────────────
  - name: "lifestyle"
    label: "Lifestyle"
    label_singular: "Lifestyle Article"
    folder: "content/lifestyle"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Summary (shown on Lifestyle list page)", name: "summary", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Faith & Family", "Health & Wellness", "Relationships", "Parenting", "Personal Growth", "Work & Career"]
        default: "Faith & Family"

  # ───────────────────────────────
  # PRAYER & TESTIMONIES
  # ───────────────────────────────
  - name: "prayer_testimonies"
    label: "Prayer & Testimonies"
    label_singular: "Prayer or Testimony"
    folder: "content/prayer-testimonies"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Submitted By (optional)", name: "submitted_by", widget: "string", required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Type"
        name: "entry_type"
        widget: "select"
        options: ["Testimony", "Prayer Request", "Answered Prayer"]
        default: "Testimony"

  # ───────────────────────────────
  # PREACHING & TEACHING
  # ───────────────────────────────
  - name: "preaching_teaching"
    label: "Preaching & Teaching"
    label_singular: "Sermon / Teaching"
    folder: "content/preaching-teaching"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Preacher / Teacher Name", name: "preacher", widget: "string" }
      - { label: "Preacher Bio (2-3 sentences — who they are, their church, credentials)", name: "preacher_bio", widget: "text", required: false, hint: "Shown in an 'About [Preacher]' box on the page. Keep it factual and short — church founded, role, notable credentials." }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "YouTube Video ID (optional)", name: "youtube_id", widget: "string", required: false, hint: "e.g. ynbJnyGie2c" }
      - { label: "Audio File URL (optional)", name: "audio_url", widget: "string", required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Body / Sermon Notes", name: "body", widget: "markdown" }
      - { label: "Series", name: "series", widget: "string", required: false }

  # ───────────────────────────────
  # SUNNY DAILY BREAD
  # ───────────────────────────────
  - name: "daily_bread"
    label: "Sunny Daily Bread"
    label_singular: "Daily Bread Entry"
    folder: "content/daily-bread"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "A short theme for the day, e.g. 'His Mercies Are New Every Morning'" }
      - { label: "Publish Date", name: "date", widget: "datetime", hint: "The day this devotional goes live" }
      - { label: "Scripture Reference", name: "scripture_ref", widget: "string", hint: "e.g. Lamentations 3:22-23" }
      - { label: "Scripture Text", name: "scripture_text", widget: "text", hint: "The full verse(s), no quotation marks needed" }
      - { label: "One-line Summary (shown on the archive card)", name: "summary", widget: "text", hint: "One sentence — the takeaway in plain words" }
      - { label: "Reflection", name: "body", widget: "markdown", hint: "The main devotional writing — a few short paragraphs" }
      - { label: "Prayer", name: "prayer", widget: "text", hint: "A short closing prayer, 2-4 sentences" }
      - { label: "Image (optional)", name: "image", widget: "image", required: false }

  # ───────────────────────────────
  # EVENTS
  # ───────────────────────────────
  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{event_date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Event Date", name: "event_date", widget: "datetime" }
      - { label: "Event Time", name: "event_time", widget: "string", hint: "e.g. 9:00 AM" }
      - { label: "Location", name: "location", widget: "string" }
      - label: "Tag"
        name: "tag"
        widget: "select"
        options: ["Conference", "Crusade", "Summit", "Celebration", "Youth Program", "Special Broadcast", "Concert", "Workshop"]
      - { label: "Description", name: "summary", widget: "text" }
      - { label: "Past Event?", name: "past", widget: "boolean", default: false }
      - { label: "Featured Image (Optional)", name: "image", widget: "image", required: false }

# Netlify configuration for Sunny FM static pages
# This file enables clean URLs, the CMS build step, and prevents 404s on direct page loads

[build]
  publish = "."
  command = "npm install && node build.js"
  functions = "netlify/functions"

# Ensure trailing-slash folders resolve to their index.html
[[redirects]]
  from = "/listen-live"
  to = "/listen-live/"
  status = 301

[[redirects]]
  from = "/advertise"
  to = "/advertise/"
  status = 301

[[redirects]]
  from = "/music-videos"
  to = "/music-videos/"
  status = 301

[[redirects]]
  from = "/events"
  to = "/events/"
  status = 301

[[redirects]]
  from = "/news"
  to = "/news/"
  status = 301

[[redirects]]
  from = "/lifestyle"
  to = "/lifestyle/"
  status = 301

[[redirects]]
  from = "/prayer-testimonies"
  to = "/prayer-testimonies/"
  status = 301

[[redirects]]
  from = "/preaching-teaching"
  to = "/preaching-teaching/"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Custom 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
